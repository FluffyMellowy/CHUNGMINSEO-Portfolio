<svg xmlns="http://www.w3.org/2000/svg" width="820" height="200" viewBox="0 0 820 200" font-family="'Hiragino Sans','Noto Sans JP','Yu Gothic',Meiryo,sans-serif">
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#9aa0a6"/>
    </marker>
  </defs>

  <text x="412" y="30" text-anchor="middle" font-size="17" font-weight="700" fill="#3a3a3a">UIメイズ ── 3つのミニゲームのウィンドウ遷移</text>
  <text x="412" y="52" text-anchor="middle" font-size="12" fill="#8a8a8a">プレイヤー1体を引き継いで進行</text>

  <!-- box1 mint -->
  <rect x="30" y="92" width="140" height="80" rx="14" fill="#e8f4ee" stroke="#9ccdb6" stroke-width="1.5"/>
  <text x="100" y="126" text-anchor="middle" font-size="13" font-weight="700" fill="#2f6b52">① 見下ろし迷路</text>
  <text x="100" y="150" text-anchor="middle" font-size="10.5" fill="#5f8a78">影ゴーストを回避</text>

  <!-- box2 blue -->
  <rect x="238" y="92" width="140" height="80" rx="14" fill="#e9f0fb" stroke="#a7c1e8" stroke-width="1.5"/>
  <text x="308" y="126" text-anchor="middle" font-size="13" font-weight="700" fill="#2f4f86">② 横スクロール</text>
  <text x="308" y="150" text-anchor="middle" font-size="10.5" fill="#5a76a6">窓が縮小＋落下物</text>

  <!-- box3 purple -->
  <rect x="446" y="92" width="140" height="80" rx="14" fill="#efeafa" stroke="#c4b5e6" stroke-width="1.5"/>
  <text x="516" y="126" text-anchor="middle" font-size="13" font-weight="700" fill="#5b4a8a">③ クレジット走破</text>
  <text x="516" y="150" text-anchor="middle" font-size="10.5" fill="#7d6fa6">テレポート＋生存</text>

  <!-- box4 gold -->
  <rect x="654" y="92" width="140" height="80" rx="14" fill="#fff3df" stroke="#e7c887" stroke-width="1.5"/>
  <text x="724" y="126" text-anchor="middle" font-size="13" font-weight="700" fill="#8a6a26">最終ゴール</text>
  <text x="724" y="150" text-anchor="middle" font-size="10.5" fill="#9c8246">3つ制覇でクリア</text>

  <!-- arrows -->
  <line x1="172" y1="132" x2="236" y2="132" stroke="#9aa0a6" stroke-width="1.5" marker-end="url(#ah)"/>
  <text x="204" y="121" text-anchor="middle" font-size="10" fill="#9aa0a6">クリアで遷移</text>

  <line x1="380" y1="132" x2="444" y2="132" stroke="#9aa0a6" stroke-width="1.5" marker-end="url(#ah)"/>
  <text x="412" y="121" text-anchor="middle" font-size="10" fill="#9aa0a6">クリアで遷移</text>

  <line x1="588" y1="132" x2="652" y2="132" stroke="#9aa0a6" stroke-width="1.5" marker-end="url(#ah)"/>
  <text x="620" y="121" text-anchor="middle" font-size="10" fill="#9aa0a6">クリアで遷移</text>
</svg>
